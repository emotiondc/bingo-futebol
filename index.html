<!DOCTYPE html>
<!-- v3.1 -->
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bingo de Futebol</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #111318;
  --surface: #1c1f2e;
  --surface2: #232637;
  --border: rgba(255,255,255,0.09);
  --border-h: rgba(255,255,255,0.2);
  --green: #3ddc84;
  --green-bg: rgba(61,220,132,0.12);
  --red: #f05252;
  --text: #eef0f7;
  --muted: rgba(238,240,247,0.42);
  --r: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); }

/* ─── SCREENS ─── */
.screen { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }
.screen.hidden { display:none; }

/* ─── CHOOSE ─── */
.choose-box { width:100%; max-width:400px; text-align:center; }
.choose-ball { font-size:2.6rem; display:inline-block; animation:spin 10s linear infinite; margin-bottom:10px; }
@keyframes spin { to { transform:rotate(360deg); } }
.choose-title { font-family:'Bebas Neue',sans-serif; font-size:2.8rem; letter-spacing:4px; background:linear-gradient(135deg,var(--green),#a7f3c6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.choose-sub { font-size:.72rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin:5px 0 28px; }
.choose-opts { display:flex; flex-direction:column; gap:9px; }
.choose-btn { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:16px 18px; cursor:pointer; display:flex; align-items:center; gap:14px; text-align:left; transition:all .18s; color:var(--text); width:100%; }
.choose-btn:hover { border-color:var(--green); background:var(--surface2); transform:translateY(-2px); box-shadow:0 6px 20px rgba(61,220,132,.1); }
.choose-icon { font-size:1.9rem; flex-shrink:0; width:40px; text-align:center; }
.choose-name { font-family:'Bebas Neue',sans-serif; font-size:1.35rem; letter-spacing:2px; display:block; }
.choose-desc { font-size:.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; display:block; margin-top:2px; }

/* ─── GAME LAYOUT — compact centered card ─── */
.game-wrap { width:100%; max-width:560px; padding:16px 14px 28px; }

.top-bar { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.g-title { font-family:'Bebas Neue',sans-serif; font-size:1.5rem; letter-spacing:3px; background:linear-gradient(135deg,var(--green),#a7f3c6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.top-right { display:flex; gap:8px; align-items:center; }
.score-pill { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:4px 13px; font-size:.75rem; font-weight:600; color:var(--muted); }
.score-pill strong { color:var(--green); }
.btn-reset { background:transparent; border:1px solid var(--border); border-radius:20px; padding:4px 13px; font-size:.68rem; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; color:var(--muted); font-family:'DM Sans',sans-serif; transition:all .15s; }
.btn-reset:hover { border-color:var(--border-h); color:var(--text); }

/* ─── PLAYER BOX ─── */
.player-box {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:14px 18px 12px;
  margin-bottom:10px;
  position:relative; overflow:hidden;
}
.player-box::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,var(--green),transparent); animation:gl 2.5s ease-in-out infinite; }
@keyframes gl { 0%,100%{opacity:.25} 50%{opacity:1} }
.p-label { font-size:.58rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin-bottom:5px; }
.p-name { font-family:'Bebas Neue',sans-serif; font-size:clamp(1.5rem,5vw,2.2rem); letter-spacing:2px; text-transform:uppercase; line-height:1; }

/* Timer */
.t-row { display:flex; align-items:center; gap:8px; margin-top:9px; }
.t-track { flex:1; height:3px; background:rgba(255,255,255,.07); border-radius:3px; overflow:hidden; }
.t-fill { height:100%; border-radius:3px; background:var(--green); transition:width 1s linear, background .3s; }
.t-fill.hot { background:var(--red); }
.t-num { font-family:'Bebas Neue',sans-serif; font-size:.95rem; width:18px; text-align:right; color:var(--green); flex-shrink:0; line-height:1; }
.t-num.hot { color:var(--red); }

/* ─── BINGO GRID ─── */
.g-hint { font-size:.58rem; letter-spacing:3px; text-transform:uppercase; color:var(--muted); text-align:center; margin-bottom:7px; }

.bingo-grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

/* Each cell is a fixed square — size driven by container width */
.cell {
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:var(--r);
  cursor:pointer;
  transition:all .15s;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:4px;
  padding:6px 4px;
  aspect-ratio:1/1;
  user-select:none;
  position:relative; overflow:hidden;
}
.cell:hover:not(.done) { border-color:var(--border-h); background:var(--surface2); transform:translateY(-1px); }
.cell.done { background:var(--green-bg); border-color:var(--green); cursor:default; }
.cell.done::after { content:'✓'; position:absolute; top:4px; right:6px; font-size:.55rem; color:var(--green); font-weight:900; opacity:.7; }
.cell.wrong { animation:shk .35s ease; border-color:rgba(240,82,82,.6); background:rgba(240,82,82,.08); }
.cell.wrong-perm { border-color:rgba(240,82,82,.5); background:rgba(240,82,82,.06); }
@keyframes shk { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)} }

/* Visual area inside cell */
.c-vis { width:36px; height:36px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.c-vis img { width:34px; height:34px; object-fit:contain; display:block; }
.c-vis img.bg-white { background:white; border-radius:5px; padding:3px; }
.pl-badge {
  background: linear-gradient(135deg, #38003c 0%, #560080 100%);
  color: #ffffff;
  font-family: 'Bebas Neue', sans-serif;
  font-weight: 400;
  font-size: 1rem;
  letter-spacing: 2px;
  border-radius: 7px;
  padding: 5px 8px;
  line-height: 1;
  border: 1.5px solid rgba(255,255,255,.35);
  box-shadow: 0 0 10px rgba(120,0,200,.4);
}
.club-init {
  width:36px; height:36px; background:var(--surface2); border:1px solid var(--border);
  border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue',sans-serif; font-size:1.1rem; color:var(--green);
}
.pl-badge-sm {
  font-size: .65rem;
  padding: 2px 5px;
  border-radius: 4px;
}

.c-vis .c-flag { font-size:1.65rem; line-height:1; }
.c-vis .c-emoji { font-size:1.5rem; line-height:1; }
/* trophy+league combo */
.c-trofeu { display:flex; align-items:center; gap:2px; }
.c-trofeu .t-icon { font-size:1rem; }
.c-trofeu img { width:20px; height:20px; object-fit:contain; }

.c-text { font-size:clamp(.45rem,1.25vw,.62rem); font-weight:700; text-transform:uppercase; letter-spacing:.2px; text-align:center; line-height:1.2; color:rgba(238,240,247,.88); padding:0 2px; }
.c-sub { font-size:clamp(.36rem,.95vw,.48rem); color:var(--green); font-weight:600; text-transform:uppercase; letter-spacing:.15px; text-align:center; line-height:1.1; padding:0 2px; }

/* ─── NEXT BUTTON ─── */
.actions { margin-top:10px; }
.btn-next { width:100%; background:var(--green); color:#07150e; border:none; border-radius:var(--r); padding:11px; font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:800; letter-spacing:.5px; text-transform:uppercase; cursor:pointer; transition:all .15s; }
.btn-next:hover { filter:brightness(1.08); transform:translateY(-1px); }
.btn-next:disabled { opacity:.3; cursor:not-allowed; transform:none; filter:none; }

/* ─── TOAST ─── */
.toast { position:fixed; top:14px; left:50%; transform:translateX(-50%) translateY(-70px); background:var(--surface2); border:1px solid var(--border); border-radius:50px; padding:9px 20px; font-size:.78rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; transition:transform .3s cubic-bezier(.34,1.56,.64,1); z-index:999; white-space:nowrap; box-shadow:0 5px 24px rgba(0,0,0,.5); }
.toast.show { transform:translateX(-50%) translateY(0); }
.toast.ok { border-color:rgba(61,220,132,.4); color:var(--green); }
.toast.err { border-color:rgba(240,82,82,.4); color:var(--red); }

/* ─── MODAL ─── */
.overlay { position:fixed; inset:0; background:rgba(5,6,12,.87); backdrop-filter:blur(10px); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px; opacity:0; pointer-events:none; transition:opacity .25s; }
.overlay.show { opacity:1; pointer-events:all; }
.modal { background:var(--surface); border:1px solid var(--border); border-radius:18px; padding:32px 24px; text-align:center; max-width:340px; width:100%; transform:scale(.9); transition:transform .3s cubic-bezier(.34,1.56,.64,1); }
.overlay.show .modal { transform:scale(1); }
.modal-icon { font-size:3rem; margin-bottom:8px; }
.modal-title { font-family:'Bebas Neue',sans-serif; font-size:2.2rem; letter-spacing:3px; background:linear-gradient(135deg,var(--green),#a7f3c6); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; margin-bottom:6px; }
.modal-desc { color:var(--muted); font-size:.84rem; line-height:1.6; margin-bottom:18px; }
.modal-stats { display:flex; gap:8px; margin-bottom:20px; }
.mstat { flex:1; background:rgba(255,255,255,.04); border:1px solid var(--border); border-radius:9px; padding:10px 6px; }
.mstat-n { font-family:'Bebas Neue',sans-serif; font-size:1.9rem; color:var(--green); line-height:1; }
.mstat-l { font-size:.58rem; text-transform:uppercase; letter-spacing:1px; color:var(--muted); margin-top:2px; }
.modal-btns { display:flex; gap:8px; }
.mbtn { flex:1; padding:9px; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:.76rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; cursor:pointer; border:none; transition:all .15s; }
.mbtn-p { background:var(--green); color:#07150e; }
.mbtn-p:hover { filter:brightness(1.1); }
.mbtn-s { background:transparent; color:var(--muted); border:1px solid var(--border); }
.mbtn-s:hover { color:var(--text); border-color:var(--border-h); }

@media(max-width:420px) {
  .c-vis { width:28px; height:28px; }
  .c-vis img { width:26px; height:26px; }
  .c-vis .c-flag { font-size:1.3rem; }
}

/* ─── DAILY CHALLENGE ─── */
.daily-banner {
  background: linear-gradient(135deg, #1a2a1a, #0d1f0d);
  border: 1px solid rgba(61,220,132,.3);
  border-radius: 14px;
  padding: 16px 18px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}
.daily-banner::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--green), transparent);
}
.daily-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.daily-label { font-size: .58rem; letter-spacing: 3px; text-transform: uppercase; color: var(--green); font-weight: 700; }
.daily-date { font-size: .62rem; color: var(--muted); letter-spacing: 1px; }
.daily-streak { display: flex; align-items: center; gap: 6px; }
.streak-fire { font-size: 1.1rem; }
.streak-num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; color: var(--green); line-height: 1; }
.streak-lbl { font-size: .6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.daily-result-row { display: flex; gap: 3px; margin-top: 8px; flex-wrap: wrap; }
.daily-dot {
  width: 14px; height: 14px; border-radius: 3px;
  background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.1);
}
.daily-dot.hit { background: var(--green); border-color: var(--green); }
.daily-dot.miss { background: var(--red); border-color: var(--red); opacity: .7; }
.daily-dot.skip { background: rgba(255,255,255,.15); border-color: rgba(255,255,255,.2); }
.daily-share-btn {
  margin-top: 10px; width: 100%;
  background: rgba(61,220,132,.12); border: 1px solid rgba(61,220,132,.3);
  border-radius: 8px; padding: 8px; font-family: 'DM Sans', sans-serif;
  font-size: .72rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  cursor: pointer; color: var(--green); transition: all .15s;
}
.daily-share-btn:hover { background: rgba(61,220,132,.2); }
.daily-completed-msg { font-size: .78rem; color: var(--green); text-align: center; margin-top: 8px; font-weight: 600; }

.choose-btn.daily-btn { border-color: rgba(61,220,132,.4); background: linear-gradient(135deg, rgba(61,220,132,.08), rgba(61,220,132,.03)); }
.choose-btn.daily-btn:hover { border-color: var(--green); background: linear-gradient(135deg, rgba(61,220,132,.18), rgba(61,220,132,.08)); }
.daily-badge { background: var(--green); color: #07150e; font-size: .55rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; padding: 2px 7px; border-radius: 10px; margin-left: 8px; }
.mode-divider { text-align: center; font-size: .62rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; margin: 10px 0 8px; }

</style>
</head>
<body>

<div class="toast" id="toast"></div>

<!-- MODAL FIM -->
<div class="overlay" id="modal">
  <div class="modal">
    <div class="modal-icon" id="mi">🏆</div>
    <div class="modal-title" id="mt">BINGO!</div>
    <div class="modal-desc" id="md"></div>
    <div class="modal-stats">
      <div class="mstat"><div class="mstat-n" id="ms-m">0</div><div class="mstat-l">Marcados</div></div>
      <div class="mstat"><div class="mstat-n" id="ms-j">0</div><div class="mstat-l">Jogadores</div></div>
    </div>
    <div class="modal-btns">
      <button class="mbtn mbtn-p" onclick="voltarEscolha()">Novo Jogo</button>
      <button class="mbtn mbtn-s" onclick="closeModal()">Ver Cartela</button>
    </div>
  </div>
</div>

<!-- CHOOSE SCREEN -->
<div class="screen" id="screen-choose">
  <div class="choose-box">
    <div class="choose-ball">⚽</div>
    <div class="choose-title">Bingo de Futebol</div>
    <div class="choose-sub">Escolhe o modo de jogo</div>
    <div class="choose-opts">
      <button class="choose-btn daily-btn" onclick="startDailyGame()">
        <div class="choose-icon">📅</div>
        <div>
          <span class="choose-name">Desafio Diário <span class="daily-badge" id="daily-badge">HOJE</span></span>
          <span class="choose-desc" id="daily-choose-desc">Cartela igual para toda a gente</span>
        </div>
      </button>
      <div class="mode-divider">— ou jogo livre —</div>
      <button class="choose-btn" onclick="startGame(false)">
        <div class="choose-icon">♾️</div>
        <div>
          <span class="choose-name">Sem Limite de Tempo</span>
          <span class="choose-desc">Cartela aleatória, sem pressão</span>
        </div>
      </button>
      <button class="choose-btn" onclick="startGame(true)">
        <div class="choose-icon">⏱️</div>
        <div>
          <span class="choose-name">10 Segundos</span>
          <span class="choose-desc">10s por jogador — passa automaticamente</span>
        </div>
      </button>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen hidden" id="screen-game">
  <div class="game-wrap">
    <div class="top-bar">
      <div class="g-title">⚽ Bingo de Futebol</div>
      <div class="top-right">
        <div class="score-pill"><strong id="sc-m">0</strong>/16</div><div class="score-pill" id="sc-jogador-pill"><strong id="sc-j">—</strong>/<span id="sc-total">—</span></div>
        <button class="btn-reset" onclick="voltarEscolha()">↺ Novo</button>
      </div>
    </div>

    <div id="daily-game-banner" class="daily-banner" style="display:none">
      <div class="daily-top">
        <div>
          <div class="daily-label">📅 Desafio Diário</div>
          <div class="daily-date" id="daily-display-date"></div>
        </div>
        <div class="daily-streak">
          <span class="streak-fire">🔥</span>
          <span class="streak-num" id="streak-num">0</span>
          <span class="streak-lbl">dias</span>
        </div>
      </div>
      <div class="daily-result-row" id="daily-dots"></div>
    </div>
    <div class="player-box">
      <div class="p-label">Jogador Atual</div>
      <div class="p-name" id="player-name">—</div>
      <div id="timer-row" class="t-row" style="display:none">
        <div class="t-track"><div class="t-fill" id="tfill"></div></div>
        <div class="t-num" id="tnum">10</div>
      </div>
    </div>

    <div class="g-hint">Seleciona a categoria correta</div>
    <div class="bingo-grid" id="grid"></div>

    <div class="actions">
      <button class="btn-next" id="btn-next" onclick="nextPlayer()">Próximo Jogador ›</button>
    </div>
  </div>
</div>

// ─── CHECK FUNCTIONS ─────────────────────────────────────────────────────────
function checkCat(cat, j) {
  switch(cat.type) {
    case "liga_jogou":   return j.ligas.includes(cat.liga);
    case "liga_venceu":  return j.trofeus.some(t => t.n === cat.liga);
    case "ucl_venceu":   return j.trofeus.some(t => t.n === "Liga dos Campeões" && t.v >= 1);
    case "ucl_venceu2":  return j.trofeus.some(t => t.n === "Liga dos Campeões" && t.v >= 2);
    case "ucl_venceu3":  return j.trofeus.some(t => t.n === "Liga dos Campeões" && t.v >= 3);
    case "ballondor":    return j.trofeus.some(t => (t.n === "Ballon d'Or" || t.n === "Bola de Ouro") && t.v >= 1);
    case "mundial":      return j.trofeus.some(t => t.n === "Copa do Mundo");
    case "euro":         return j.trofeus.some(t => t.n === "Euro");
    case "clube":        return j.clubes.includes(cat.clube);
    case "pais":         return j.pais === cat.pais;
    case "posicao":      return j.posicao === cat.posicao;
    default: return false;
  }
}

// ─── CELL LABEL ──────────────────────────────────────────────────────────────
function getCellLabel(cat, j) {
  if (cat.type === "liga_venceu" && j) {
    const t = j.trofeus.find(t => t.n === cat.liga);
    if (t && t.v > 1) return `${t.v}× Vencedor`;
    return "Vencedor";
  }
  if (cat.type === "ucl_venceu" && j) {
    const t = j.trofeus.find(t => t.n === "Liga dos Campeões");
    if (t && t.v > 1) return `${t.v}× Vencedor`;
    return "Vencedor";
  }
  if ((cat.type === "ucl_venceu2" || cat.type === "ucl_venceu3") && j) {
    const t = j.trofeus.find(t => t.n === "Liga dos Campeões");
    if (t) return `${t.v}× Vencedor`;
  }
  return cat.nome;
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────
function startGame(comTimer) {
  isDaily = false;
  usarTimer = comTimer;
  document.getElementById('screen-choose').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');
  document.getElementById('daily-game-banner').style.display = 'none';
  newGame();
}

function voltarEscolha() {
  stopTimer();
  closeModal();
  isDaily = false;
  document.getElementById('daily-game-banner').style.display = 'none';
  document.getElementById('screen-game').classList.add('hidden');
  document.getElementById('screen-choose').classList.remove('hidden');
  initChooseScreen();
}

function newGame() {
  stopTimer();
  state = {
    cartela:  shuffle(CATEGORIAS).slice(0, 16),
    fila:     shuffle(JOGADORES),
    idx:      0,
    marcados: {},
    ativo:    true,
    done:     false
  };
  document.getElementById('timer-row').style.display = usarTimer ? 'flex' : 'none';
  const shareArea = document.getElementById('daily-share-area');
  if (shareArea) shareArea.remove();
  renderGrid();
  renderPlayer();
  updateScore();
}

// ─── GRID ─────────────────────────────────────────────────────────────────────
function renderGrid() {
  const g = document.getElementById('grid');
  g.innerHTML = '';
  state.cartela.forEach((cat, i) => {
    const d = document.createElement('div');
    d.className = 'cell';
    d.id = 'c' + i;
    d.onclick = () => pick(i);
    const m = state.marcados[i];
    if (m && m.nome) {
      d.classList.add('done');
      d.innerHTML = visualHTML(cat.visual)
        + '<div class="c-text">' + cat.nome + '</div>'
        + '<div class="c-sub">'  + m.nome   + '</div>';
    } else {
      d.innerHTML = visualHTML(cat.visual)
        + '<div class="c-text">' + cat.nome + '</div>';
    }
    g.appendChild(d);
  });
}

// ─── PLAYER ───────────────────────────────────────────────────────────────────
function renderPlayer() {
  if (state.idx >= state.fila.length) { gameOver(); return; }
  document.getElementById('player-name').textContent = state.fila[state.idx].nome;
  state.sel = null;
  document.getElementById('btn-next').disabled = false;
  startTimer();
}

// ─── PICK ─────────────────────────────────────────────────────────────────────
function pick(i) {
  if (!state.ativo) return;
  const m = state.marcados[i];
  if (m && m.nome) return;      // already correctly answered
  if (m === false) return;      // currently in wrong-answer lockout

  const j   = state.fila[state.idx];
  const cat = state.cartela[i];
  const cell = document.getElementById('c' + i);

  if (checkCat(cat, j)) {
    // ── CORRECT ──────────────────────────────────────────────────────────────
    stopTimer();
    state.marcados[i] = { nome: j.nome };
    cell.classList.remove('wrong');
    cell.classList.add('done');
    cell.innerHTML = visualHTML(cat.visual)
      + '<div class="c-text">' + cat.nome + '</div>'
      + '<div class="c-sub">'  + j.nome   + '</div>';
    toast('✅ ' + j.nome + ' → ' + cat.nome, 'ok');
    updateScore();

    if (isDaily) {
      saveDailyState(state.idx + 1, state.marcados, false);
      renderDailyDots();
    }

    // check bingo (16 cells correctly filled)
    const hits = Object.values(state.marcados).filter(v => v && v.nome).length;
    if (hits === 16 && !state.done) {
      state.done = true;
      state.ativo = false;
      state.idx++;
      document.getElementById('btn-next').disabled = true;
      if (isDaily) {
        saveDailyState(state.idx, state.marcados, true);
        showDailyShare();
      }
      setTimeout(() => showEndModal(true), 700);
    } else {
      state.idx++;
      setTimeout(renderPlayer, 500);
    }

  } else {
    // ── WRONG ────────────────────────────────────────────────────────────────
    state.ativo = false;
    cell.classList.add('wrong');
    toast('❌ Errado! A passar ao próximo...', 'err');
    stopTimer();

    setTimeout(() => {
      cell.classList.remove('wrong');
      state.ativo = true;
      state.idx++;
      if (isDaily) {
        saveDailyState(state.idx, state.marcados, false);
        renderDailyDots();
      }
      renderPlayer();
      updateScore();
    }, 1200);
  }
}

function nextPlayer() {
  if (!state.ativo || state.done) return;
  stopTimer();
  state.idx++;
  if (isDaily) {
    saveDailyState(state.idx, state.marcados, false);
    renderDailyDots();
  }
  renderPlayer();
  updateScore();
}

function gameOver() {
  state.ativo = false;
  stopTimer();
  document.getElementById('btn-next').disabled = true;
  document.getElementById('player-name').textContent = 'Sem mais jogadores';
  setTimeout(() => showEndModal(false), 700);
}

function updateScore() {
  const hits = Object.values(state.marcados).filter(v => v && v.nome).length;
  document.getElementById('sc-m').textContent = hits;
  const jEl = document.getElementById('sc-j');
  const tEl = document.getElementById('sc-total');
  if (jEl) jEl.textContent = Math.min(state.idx + 1, state.fila.length);
  if (tEl) tEl.textContent = state.fila.length;
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function showEndModal(bingo) {
  const hits  = Object.values(state.marcados).filter(v => v && v.nome).length;
  const modal = document.getElementById('modal');
  const title = document.getElementById('modal-title');
  const msg   = document.getElementById('modal-msg');
  if (!modal) return;
  if (bingo) {
    title.textContent = '🎉 BINGO!';
    msg.textContent   = 'Completaste a cartela com ' + state.idx + ' jogadores!';
  } else {
    title.textContent = 'Jogo terminado';
    msg.textContent   = hits + ' de 16 categorias preenchidas.';
  }
  modal.classList.add('show');
}

function closeModal() {
  const modal = document.getElementById('modal');
  if (modal) modal.classList.remove('show');
}

// ─── TIMER ────────────────────────────────────────────────────────────────────
function startTimer() {
  stopTimer();
  if (!usarTimer) return;
  timerEnd = Date.now() + 10000;
  updateTimerUI();
  timerIv = setInterval(() => {
    const rem = Math.ceil((timerEnd - Date.now()) / 1000);
    timerSec = Math.max(0, rem);
    updateTimerUI();
    if (timerSec <= 0) { stopTimer(); nextPlayer(); }
  }, 250);
}

function stopTimer() {
  clearInterval(timerIv);
  timerIv = null;
}

function updateTimerUI() {
  const bar = document.getElementById('timer-bar');
  const lbl = document.getElementById('timer-lbl');
  if (bar) bar.style.width = (timerSec / 10 * 100) + '%';
  if (lbl) lbl.textContent = timerSec + 's';
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
function toast(msg, cls) {
  const t = document.getElementById('toast');
  if (!t) return;
  t.textContent  = msg;
  t.className    = 'toast ' + cls + ' show';
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 2000);
}


function getDailyKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function dailySeed(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = Math.imul(31, h) + str.charCodeAt(i) | 0;
  return Math.abs(h);
}

function seededShuffle(arr, seed) {
  const a = [...arr];
  let s = seed;
  for (let i = a.length - 1; i > 0; i--) {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    const j = Math.abs(s) % (i + 1);
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getDailyCartela() {
  return seededShuffle(CATEGORIAS, dailySeed(getDailyKey())).slice(0, 16);
}

function getDailyFila() {
  const seed    = dailySeed(getDailyKey() + '_fila');
  const cartela = getDailyCartela();
  const TARGET  = 40;
  const MIN_PER_CAT = 2;

  // Seeded shuffle of all players
  const all = seededShuffle(JOGADORES, seed);

  // Build pool: ensure each category has at least MIN_PER_CAT players
  const selected = new Set();
  const catHits  = new Array(16).fill(0);

  // Pass 1: for each category, pick first MIN_PER_CAT matching players from shuffled list
  for (let ci = 0; ci < 16; ci++) {
    const cat = cartela[ci];
    let found = 0;
    for (let pi = 0; pi < all.length && found < MIN_PER_CAT; pi++) {
      if (checkCat(cat, all[pi])) {
        selected.add(pi);
        found++;
        catHits[ci] = found;
      }
    }
  }

  // Pass 2: fill remaining slots up to TARGET from shuffled order
  for (let pi = 0; pi < all.length && selected.size < TARGET; pi++) {
    selected.add(pi);
  }

  // Return players in original seeded-shuffle order (deterministic)
  return [...selected].sort((a,b) => a-b).map(i => all[i]);
}

function loadDailyState() {
  try {
    const raw = localStorage.getItem('daily_' + getDailyKey());
    if (!raw) return null;
    const s = JSON.parse(raw);
    // Validate format - marcados values must be objects with nome or false
    if (s.marcados) {
      for (const k of Object.keys(s.marcados)) {
        const v = s.marcados[k];
        // Accept {nome:...} or false; reject old formats (true, {jogador:...})
        if (v !== false && !(v && typeof v === 'object' && v.nome)) {
          console.warn('Daily: stale/invalid saved state, resetting');
          return null;
        }
      }
    }
    return s;
  } catch(e) { return null; }
}

function saveDailyState(idx, marcados, done) {
  try {
    const mc = Object.values(marcados).filter(v => v && v.nome).length;
    localStorage.setItem('daily_' + getDailyKey(), JSON.stringify({
      idx: idx,
      marcados: marcados,
      done: done,
      marcados_count: mc
    }));
  } catch(e) {}
}

function loadStreak() {
  try { return parseInt(localStorage.getItem('daily_streak') || '0'); } catch(e) { return 0; }
}

function updateStreak() {
  try {
    const last = localStorage.getItem('daily_streak_last');
    const today = getDailyKey();
    if (last === today) return;
    const d = new Date(); d.setDate(d.getDate() - 1);
    const yesterday = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    let streak = loadStreak();
    streak = (last === yesterday) ? streak + 1 : 1;
    localStorage.setItem('daily_streak', streak);
    localStorage.setItem('daily_streak_last', today);
  } catch(e) {}
}

function initChooseScreen() {
  const saved = loadDailyState();
  const desc  = document.getElementById('daily-choose-desc');
  const badge = document.getElementById('daily-badge');
  if (!desc || !badge) return;
  if (saved && saved.done) {
    desc.textContent  = '\u2705 J\u00e1 jogaste hoje \u2014 ' + (saved.marcados_count || 0) + '/16';
    badge.textContent = 'FEITO';
    badge.style.background = 'rgba(61,220,132,.3)';
    badge.style.color      = 'var(--green)';
  } else {
    const d = new Date();
    desc.textContent  = 'Cartela de ' + d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
    badge.textContent = 'HOJE';
    badge.style.background = '';
    badge.style.color      = '';
  }
}

function startDailyGame() {
  isDaily  = true;
  usarTimer = false;
  const saved   = loadDailyState();
  const cartela = getDailyCartela();
  const fila    = getDailyFila();

  if (saved && saved.done) {
    state = { cartela, fila, idx: saved.idx, marcados: saved.marcados, ativo: false, done: true };
  } else if (saved && !saved.done) {
    state = { cartela, fila, idx: saved.idx, marcados: saved.marcados, ativo: true,  done: false };
  } else {
    state = { cartela, fila, idx: 0, marcados: {}, ativo: true, done: false };
    updateStreak();
  }

  document.getElementById('timer-row').style.display = 'none';
  document.getElementById('screen-choose').classList.add('hidden');
  document.getElementById('screen-game').classList.remove('hidden');

  const banner = document.getElementById('daily-game-banner');
  if (banner) {
    banner.style.display = 'block';
    const d = new Date();
    document.getElementById('daily-display-date').textContent =
      d.getDate() + '/' + (d.getMonth()+1) + '/' + d.getFullYear();
    document.getElementById('streak-num').textContent = loadStreak();
  }

  renderGrid();
  renderPlayer();
  updateScore();
  renderDailyDots();

  if (state.done) {
    setTimeout(() => showDailyShare(), 300);
  }
}

function renderDailyDots() {
  const container = document.getElementById('daily-dots');
  if (!container) return;
  container.innerHTML = '';
  for (let i = 0; i < state.idx; i++) {
    const dot = document.createElement('div');
    const v   = state.marcados[i];
    dot.className = 'daily-dot ' + (v && v.nome ? 'hit' : v === false ? 'miss' : 'skip');
    container.appendChild(dot);
  }
}

function showDailyShare() {
  const banner = document.getElementById('daily-game-banner');
  if (!banner || document.getElementById('daily-share-area')) return;
  const hits = Object.values(state.marcados).filter(v => v && v.nome).length;
  const div  = document.createElement('div');
  div.id = 'daily-share-area';
  div.innerHTML =
    '<div class="daily-completed-msg">\uD83C\uDFC6 Desafio completo! ' + hits + '/16 acertos</div>' +
    '<button class="daily-share-btn" onclick="copyShare()">\uD83D\uDCCB Copiar resultado</button>';
  banner.appendChild(div);
}

function buildShareText() {
  const saved = loadDailyState();
  if (!saved) return '';
  const hits = Object.values(saved.marcados).filter(v => v && v.nome).length;
  let dots = '';
  for (let i = 0; i < saved.idx; i++) {
    const v = saved.marcados[i];
    dots += (v && v.nome) ? '\uD83D\uDFE9' : (v === false ? '\uD83D\uDFE5' : '\u2B1C');
  }
  let rows = '';
  for (let i = 0; i < dots.length; i += 16) rows += dots.slice(i, i+16) + '\n';
  return '\u26BD Bingo de Futebol \u2014 ' + getDailyKey() + '\n' + hits + '/' + saved.idx + ' acertos\n\n' + rows.trim();
}

function copyShare() {
  const txt = buildShareText();
  if (navigator.clipboard) {
    navigator.clipboard.writeText(txt).then(() => toast('\u2705 Copiado!', 'ok'));
  } else {
    const ta = document.createElement('textarea');
    ta.value = txt; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
    toast('\u2705 Copiado!', 'ok');
  }
}



document.addEventListener('DOMContentLoaded', () => { initChooseScreen(); });
</script>
